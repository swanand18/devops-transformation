# ansible/inventory/production.ini
# Replace <EC2_PUBLIC_IP> with your actual EC2 instance IP

[production]
retail-prod ansible_host=<EC2_PUBLIC_IP> ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/your-key.pem

[production:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
grafana_password=admin123   # change in production!
