global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: "production"
    project:     "retail-platform"

# ── Alertmanager ─────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # add alertmanager:9093 when configured

# ── Alert Rules ───────────────────────────────────────────
rule_files:
  - "alerts.yml"

# ── Scrape Jobs ───────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Application metrics
  - job_name: "retail-app"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["app:8080"]
        labels:
          service: "retail-app"
          tier:    "application"

  # Node Exporter (host system metrics)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "app-server"

  # cAdvisor (container metrics)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          instance: "docker-host"

  # AWS EC2 instances (when deployed to AWS)
  # Uncomment and update when deploying to AWS EC2
  # - job_name: "ec2-instances"
  #   ec2_sd_configs:
  #     - region: ap-south-1
  #       port: 9100
  #   relabel_configs:
  #     - source_labels: [__meta_ec2_tag_Project]
  #       target_label:  project
  #     - source_labels: [__meta_ec2_tag_Environment]
  #       target_label:  environment
  #     - source_labels: [__meta_ec2_instance_id]
  #       target_label:  instance
